<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#3b82f6"/>
  <!-- White grid area -->
  <rect x="6" y="6" width="52" height="52" rx="4" fill="#fff"/>
  <!-- Highlighted cell (center) -->
  <rect x="24" y="24" width="16" height="16" fill="#dbeafe"/>
  <!-- 3x3 grid lines -->
  <line x1="23" y1="6" x2="23" y2="58" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="41" y1="6" x2="41" y2="58" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="6" y1="23" x2="58" y2="23" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="6" y1="41" x2="58" y2="41" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Number in highlighted cell -->
  <text x="32" y="37" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3b82f6">9</text>
  <!-- Faint numbers in other cells -->
  <text x="14.5" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">5</text>
  <text x="50" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">3</text>
</svg>
